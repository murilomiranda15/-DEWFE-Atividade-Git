        <p>O Paysandu Sport Club, mais conhecido como Paysandu, é um clube brasileiro com sede em Belém, capital do Pará. Fundado em 2 de fevereiro de 1914 por membros do Norte Club, é reconhecido principalmente por suas atividades no futebol.</p>
