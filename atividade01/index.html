<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Formulário</title>
</head>

<body>
    <header>
        <h1>Cadastro</h1>
    </header>

    <main>

        <!-- Formulário de Cadastro -->
        <section>
            <p>O formulario de cadastro deve ser desenvolvido aqui</p>

            <form id="formCadastro">

                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <p>Este é um formulário de fieldset.</p>
                    <p>Nome completo:</p>
                    <input type="text" id="nome" name="nome" required minlength="3" placeholder="Seu nome">

                    <p>E-mail:</p>
                    <input type="email" id="email" name="email" required placeholder="exemplo@email.com">

                    <p>Data de nascimento:</p>
                    <input type="date" id="dataNascimento" name="dataNascimento" required>

                </fieldset>

                <fieldset>
                    <legend>Informações</legend>

                    <p>Gênero:</p>
                    <div class="genero">
                        <label><input type="radio" name="genero" value="masculino" required> Masculino</label>
                        <label><input type="radio" name="genero" value="feminino" required> Feminino</label>
                        <label><input type="radio" name="genero" value="outro"> Outro</label>
                    </div>

                    <hr>
                    <p>Interesses:</p>
                    <div class="interesses">
                        <label><input type="checkbox" name="interesses" value="tecnologia"> Tecnologia</label>
                        <label><input type="checkbox" name="interesses" value="esportes"> Esportes</label>
                        <label><input type="checkbox" name="interesses" value="musica"> Música</label>
                        <label><input type="checkbox" name="interesses" value="jogos"> Jogos</label>
                    </div>

                    <hr>
                    <p>Estado:</p>
                    <select id="estado" name="estado" required>
                        <option value="">Selecione</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="RS">Rio Grande do Sul</option>
                    </select>

                    <hr>
                    <p>Mensagem:</p>
                    <textarea id="mensagem" name="mensagem" rows="4"></textarea>

                    <p>Upload de imagem:</p>
                    <input type="file" name="arquivo" id="arquivo">

                    <br>
                    <input type="submit" value="Enviar" id="enviar">
                    <input type="reset" value="Limpar" id="limpar">
                </fieldset>
            </form>
        </section>

        <!-- Resultado será exibido aqui, não é necessário editar-->
        <section>
            <h2 id="sec-resultado">Resultado</h2>
            <div id="resultado"></div>
        </section>

    </main>

    <footer>

        <p>&copy; 2026 - Formulário Turma 01 ADS</p>

        <nav aria-label="Documentações">
            <a href="https://developer.mozilla.org/pt-BR/docs/Web/HTML" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"
                    alt="Documentação HTML" width="40">
            </a>

            <a href="https://developer.mozilla.org/pt-BR/docs/Web/CSS" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg"
                    alt="Documentação CSS" width="40">
            </a>

            <a href="https://developer.mozilla.org/pt-BR/docs/Web/JavaScript" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"
                    alt="Documentação JavaScript" width="40">
            </a>
        </nav>

    </footer>
</body>

</html>
